
<!DOCTYPE html>
<html>
<head>
    <title>查看用戶詳情</title>
    <meta charset="utf-8">
    <style>
        body { font-family: Arial; background: #2c3e50; color: white; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: #34495e; padding: 30px; border-radius: 8px; }
        .user-info { background: #2c3e50; padding: 20px; border-radius: 4px; margin-bottom: 20px; }
        .info-row { display: flex; margin-bottom: 15px; border-bottom: 1px solid #5a6c7d; padding-bottom: 10px; }
        .info-label { font-weight: bold; color: #3498db; width: 200px; flex-shrink: 0; }
        .info-value { flex: 1; word-break: break-all; }
        .btn { padding: 10px 20px; margin: 5px; text-decoration: none; border-radius: 4px; display: inline-block; }
        .btn-primary { background: #3498db; color: white; }
        .btn-back { background: #95a5a6; color: white; }
        .btn:hover { opacity: 0.8; }
        .field-type { font-size: 11px; color: #bdc3c7; font-weight: normal; }
    </style>
</head>
<body>
    <div class="container">
        <h2>用戶詳情 (ID: {{ user.user_id }})</h2>
        
        <div class="user-info">
            {% for column in columns %}
            <div class="info-row">
                <div class="info-label">
                    {{ column }}
                    <span class="field-type">({{ get_column_type(column) }})</span>
                </div>
                <div class="info-value">
                    {% if user[column] is not none %}
                        {{ format_field_value(user[column], get_column_type(column)) }}
                    {% else %}
                        <em style="color: #95a5a6;">null</em>
                    {% endif %}
                </div>
            </div>
            {% endfor %}
        </div>
        
        <div>
            <a href="{{ url_for('edit_user', user_id=user.user_id) }}" class="btn btn-primary">編輯用戶</a>
            <a href="{{ url_for('dashboard') }}" class="btn btn-back">返回列表</a>
        </div>
    </div>
</body>
</html>
