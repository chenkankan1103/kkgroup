<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>資料庫檢視</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css">
    <style>
        body { background-color: #f8f9fa; }
        .table-container { margin-bottom: 4rem; }
    </style>
</head>
<body>
    <div class="container py-5">
        <h1 class="mb-4 text-center">📊 資料庫內容</h1>

        {% if tables %}
            {% for table in tables %}
                <div class="table-container card shadow-sm mb-5">
                    <div class="card-header bg-primary text-white">
                        <h5 class="mb-0">{{ table.name }}</h5>
                    </div>
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-striped table-bordered dataTable" id="table-{{ loop.index }}">
                                <thead class="table-light">
                                    <tr>
                                        {% for column in table.columns %}
                                            <th>{{ column }}</th>
                                        {% endfor %}
                                    </tr>
                                </thead>
                                <tbody>
                                    {% for row in table.rows %}
                                        <tr>
                                            {% for value in row %}
                                                <td>{{ value }}</td>
                                            {% endfor %}
                                        </tr>
                                    {% endfor %}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            {% endfor %}
        {% else %}
            <div class="alert alert-warning text-center">無資料可顯示。</div>
        {% endif %}
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const tables = document.querySelectorAll(".dataTable");
            tables.forEach(table => {
                new DataTable(table, {
                    language: {
                        url: "https://cdn.datatables.net/plug-ins/1.13.6/i18n/zh-HANT.json"
                    },
                    pageLength: 10,
                    lengthMenu: [ [10, 25, 50, -1], [10, 25, 50, "全部"] ]
                });
            });
        });
    </script>
</body>
</html>
