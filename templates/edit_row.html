<!-- templates/edit_row.html -->
<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8" />
    <title>編輯資料 - {{ table_name }} - ID: {{ row_id }}</title>
</head>
<body>
    <h1>編輯資料 - 表格：{{ table_name }} - ID: {{ row_id }}</h1>
    <form method="post" action="{{ url_for('update_row', table_name=table_name, row_id=row_id) }}">
        <table>
            {% for col in columns %}
            <tr>
                <td><label>{{ col[1] }}</label></td>
                <td>
                    {% if col[5] == 1 %}
                        <!-- 主鍵或自動生成欄位不可編輯 -->
                        <input type="text" name="{{ col[1] }}" value="{{ row[loop.index0] }}" readonly />
                    {% else %}
                        <input type="text" name="{{ col[1] }}" value="{{ row[loop.index0] }}" />
                    {% endif %}
                </td>
            </tr>
            {% endfor %}
        </table>
        <button type="submit">儲存更新</button>
    </form>
    <a href="{{ url_for('view_table', table_name=table_name) }}">返回 {{ table_name }} 表格</a>
</body>
</html>
