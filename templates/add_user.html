
<!DOCTYPE html>
<html>
<head>
    <title>新增用戶</title>
    <meta charset="utf-8">
    <style>
        body { font-family: Arial; background: #2c3e50; color: white; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: #34495e; padding: 30px; border-radius: 8px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #3498db; }
        input, select, textarea { width: 100%; padding: 10px; background: #2c3e50; border: 1px solid #5a6c7d; color: white; box-sizing: border-box; border-radius: 4px; }
        button { width: 100%; padding: 12px; background: #27ae60; border: none; color: white; cursor: pointer; margin: 10px 0; border-radius: 4px; }
        button:hover { background: #219a52; }
        .btn-back { background: #95a5a6; }
        .btn-back:hover { background: #7f8c8d; }
        .flash { padding: 10px; margin: 10px 0; border-radius: 4px; }
        .error { background: #e74c3c; }
        .success { background: #27ae60; }
        .field-type { font-size: 12px; color: #bdc3c7; }
    </style>
</head>
<body>
    <div class="container">
        <h2>新增用戶</h2>
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="flash {{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        <form method="post">
            {% for column in columns %}
            <div class="form-group">
                <label for="{{ column }}">
                    {{ column }}
                    <span class="field-type">({{ get_column_type(column) }})</span>
                </label>
                <input type="{{ get_input_type(column, get_column_type(column)) }}" 
                       id="{{ column }}" 
                       name="{{ column }}" 
                       placeholder="請輸入 {{ column }}">
            </div>
            {% endfor %}
            <button type="submit">新增用戶</button>
            <button type="button" class="btn-back" onclick="window.location.href='{{ url_for('dashboard') }}'">返回</button>
        </form>
    </div>
</body>
</html>
