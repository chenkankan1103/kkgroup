<!-- templates/add_row.html -->
<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8" />
    <title>新增資料 - {{ table_name }}</title>
</head>
<body>
    <h1>新增資料 - 表格：{{ table_name }}</h1>
    <form method="post" action="{{ url_for('insert_row', table_name=table_name) }}">
        <table>
            {% for col in columns %}
                {% if col[5] != 1 %}
                <tr>
                    <td><label>{{ col[1] }}</label></td>
                    <td><input type="text" name="{{ col[1] }}" /></td>
                </tr>
                {% endif %}
            {% endfor %}
        </table>
        <button type="submit">新增</button>
    </form>
    <a href="{{ url_for('view_table', table_name=table_name) }}">返回 {{ table_name }} 表格</a>
</body>
</html>
